type: trigger
name: Guezli/mailcow-f2b-feed
description: "Propagate Mailcow's internal F2B bans into the local Crowdsec LAPI"
filter: "evt.Meta.log_type == 'mailcow_f2b_ban'"
groupby: evt.Meta.source_ip
blackhole: 1h
labels:
  service: mailcow-f2b
  behavior: "generic:bruteforce"
  label: "Mailcow F2B Cross-Layer Feed"
  remediation: true
